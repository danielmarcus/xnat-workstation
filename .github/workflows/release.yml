name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: Publish artifacts to GitHub Releases
        required: false
        type: boolean
        default: false
      build_windows:
        description: Attempt Windows packaging if DigiCert KeyLocker is configured
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_OPTIONS: --max-old-space-size=4096

jobs:
  release-macos:
    name: Release macOS
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Determine publish mode
        id: publish_mode
        shell: bash
        env:
          PUBLISH_INPUT: ${{ inputs.publish }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "mode=always" >> "$GITHUB_OUTPUT"
          elif [[ "${PUBLISH_INPUT}" == "true" ]]; then
            echo "mode=always" >> "$GITHUB_OUTPUT"
          else
            echo "mode=never" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Apple signing inputs
        id: apple_signing
        shell: bash
        env:
          MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          if [[ -z "${MACOS_CERT_P12_BASE64}" || -z "${MACOS_CERT_PASSWORD}" || -z "${APPLE_API_KEY_P8_BASE64}" || -z "${APPLE_API_KEY_ID}" || -z "${APPLE_API_ISSUER}" ]]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$MACOS_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/macos-signing.p12"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Require Apple secrets for tagged releases
        if: startsWith(github.ref, 'refs/tags/') && steps.apple_signing.outputs.ready != 'true'
        shell: bash
        run: |
          echo "Missing required macOS signing/notarization secrets." >&2
          echo "Set MACOS_CERT_P12_BASE64, MACOS_CERT_PASSWORD, APPLE_API_KEY_P8_BASE64, APPLE_API_KEY_ID, and APPLE_API_ISSUER." >&2
          exit 1

      - name: Build and publish macOS artifacts
        if: steps.apple_signing.outputs.ready == 'true'
        shell: bash
        env:
          CSC_LINK: ${{ runner.temp }}/macos-signing.p12
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package -- --mac --publish "${{ steps.publish_mode.outputs.mode }}"

      - name: Upload macOS artifacts for manual dry runs
        if: steps.apple_signing.outputs.ready == 'true' && steps.publish_mode.outputs.mode != 'always'
        uses: actions/upload-artifact@v4
        with:
          name: xnat-workstation-macos
          path: release/
          if-no-files-found: error

  release-linux:
    name: Release Linux
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Determine publish mode
        id: publish_mode
        shell: bash
        env:
          PUBLISH_INPUT: ${{ inputs.publish }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "mode=always" >> "$GITHUB_OUTPUT"
          elif [[ "${PUBLISH_INPUT}" == "true" ]]; then
            echo "mode=always" >> "$GITHUB_OUTPUT"
          else
            echo "mode=never" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish Linux artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run package -- --linux --publish "${{ steps.publish_mode.outputs.mode }}"

      - name: Upload Linux artifacts for manual dry runs
        if: steps.publish_mode.outputs.mode != 'always'
        uses: actions/upload-artifact@v4
        with:
          name: xnat-workstation-linux
          path: release/
          if-no-files-found: error

  release-windows:
    name: Release Windows
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Determine publish mode
        id: publish_mode
        shell: bash
        env:
          PUBLISH_INPUT: ${{ inputs.publish }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "mode=always" >> "$GITHUB_OUTPUT"
          elif [[ "${PUBLISH_INPUT}" == "true" ]]; then
            echo "mode=always" >> "$GITHUB_OUTPUT"
          else
            echo "mode=never" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare Windows signing inputs
        id: windows_signing
        shell: pwsh
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_KEYPAIR_ALIAS: ${{ vars.SM_KEYPAIR_ALIAS }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE_B64: ${{ secrets.SM_CLIENT_CERT_FILE_B64 }}
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          SM_CODE_SIGNING_CERT_SHA1_HASH: ${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}
          WIN_CSC_SUBJECT_NAME: ${{ vars.WIN_CSC_SUBJECT_NAME }}
        run: |
          $hasCertSelector = -not [string]::IsNullOrWhiteSpace($env:SM_CODE_SIGNING_CERT_SHA1_HASH) -or -not [string]::IsNullOrWhiteSpace($env:WIN_CSC_SUBJECT_NAME)
          $hasKeypairAlias = -not [string]::IsNullOrWhiteSpace($env:SM_KEYPAIR_ALIAS)
          "has_sm_host=$(-not [string]::IsNullOrWhiteSpace($env:SM_HOST))" >> $env:GITHUB_OUTPUT
          "has_sm_keypair_alias=$hasKeypairAlias" >> $env:GITHUB_OUTPUT
          "has_sm_api_key=$(-not [string]::IsNullOrWhiteSpace($env:SM_API_KEY))" >> $env:GITHUB_OUTPUT
          "has_sm_client_cert=$(-not [string]::IsNullOrWhiteSpace($env:SM_CLIENT_CERT_FILE_B64))" >> $env:GITHUB_OUTPUT
          "has_sm_client_cert_password=$(-not [string]::IsNullOrWhiteSpace($env:SM_CLIENT_CERT_PASSWORD))" >> $env:GITHUB_OUTPUT
          "has_cert_selector=$hasCertSelector" >> $env:GITHUB_OUTPUT

          if ([string]::IsNullOrWhiteSpace($env:SM_HOST) -or -not $hasKeypairAlias -or [string]::IsNullOrWhiteSpace($env:SM_API_KEY) -or [string]::IsNullOrWhiteSpace($env:SM_CLIENT_CERT_FILE_B64) -or [string]::IsNullOrWhiteSpace($env:SM_CLIENT_CERT_PASSWORD) -or -not $hasCertSelector) {
            "ready=false" >> $env:GITHUB_OUTPUT
            exit 0
          }

          [IO.File]::WriteAllBytes(
            "$env:RUNNER_TEMP\sm-client-cert.p12",
            [Convert]::FromBase64String($env:SM_CLIENT_CERT_FILE_B64)
          )
          "ready=true" >> $env:GITHUB_OUTPUT

      - name: Require Windows secrets when manually requested
        if: github.event_name == 'workflow_dispatch' && inputs.build_windows && steps.windows_signing.outputs.ready != 'true'
        shell: pwsh
        run: |
          Write-Host "SM_HOST present: ${{ steps.windows_signing.outputs.has_sm_host }}"
          Write-Host "SM_KEYPAIR_ALIAS present: ${{ steps.windows_signing.outputs.has_sm_keypair_alias }}"
          Write-Host "SM_API_KEY present: ${{ steps.windows_signing.outputs.has_sm_api_key }}"
          Write-Host "SM_CLIENT_CERT_FILE_B64 present: ${{ steps.windows_signing.outputs.has_sm_client_cert }}"
          Write-Host "SM_CLIENT_CERT_PASSWORD present: ${{ steps.windows_signing.outputs.has_sm_client_cert_password }}"
          Write-Host "Windows cert selector present: ${{ steps.windows_signing.outputs.has_cert_selector }}"
          Write-Error "Missing DigiCert KeyLocker configuration. Set SM_HOST, SM_KEYPAIR_ALIAS, SM_API_KEY, SM_CLIENT_CERT_FILE_B64, SM_CLIENT_CERT_PASSWORD, and SM_CODE_SIGNING_CERT_SHA1_HASH or WIN_CSC_SUBJECT_NAME."
          exit 1

      - name: Log Windows signing configuration
        if: steps.windows_signing.outputs.ready == 'true'
        shell: pwsh
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_KEYPAIR_ALIAS: ${{ vars.SM_KEYPAIR_ALIAS }}
          WIN_CSC_SUBJECT_NAME: ${{ vars.WIN_CSC_SUBJECT_NAME }}
        run: |
          Write-Host "SM_HOST: $env:SM_HOST"
          Write-Host "SM_KEYPAIR_ALIAS present: $(-not [string]::IsNullOrWhiteSpace($env:SM_KEYPAIR_ALIAS))"
          Write-Host "WIN_CSC_SUBJECT_NAME present: $(-not [string]::IsNullOrWhiteSpace($env:WIN_CSC_SUBJECT_NAME))"

      - name: Set up DigiCert KeyLocker tools
        if: steps.windows_signing.outputs.ready == 'true'
        uses: digicert/code-signing-software-trust-action@v1
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}\sm-client-cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}

      - name: Verify DigiCert client connectivity
        if: steps.windows_signing.outputs.ready == 'true'
        shell: pwsh
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}\sm-client-cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
        run: smctl healthcheck

      - name: Sync Windows certificate store
        if: steps.windows_signing.outputs.ready == 'true'
        shell: pwsh
        env:
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}\sm-client-cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          SM_KEYPAIR_ALIAS: ${{ vars.SM_KEYPAIR_ALIAS }}
        run: |
          smctl windows certsync --keypair-alias="$env:SM_KEYPAIR_ALIAS"

      - name: Build and publish Windows artifacts
        if: steps.windows_signing.outputs.ready == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SM_HOST: ${{ vars.SM_HOST }}
          SM_API_KEY: ${{ secrets.SM_API_KEY }}
          SM_CLIENT_CERT_FILE: ${{ runner.temp }}\sm-client-cert.p12
          SM_CLIENT_CERT_PASSWORD: ${{ secrets.SM_CLIENT_CERT_PASSWORD }}
          WIN_CSC_CERT_SHA1: ${{ secrets.SM_CODE_SIGNING_CERT_SHA1_HASH }}
          WIN_CSC_SUBJECT_NAME: ${{ vars.WIN_CSC_SUBJECT_NAME }}
        run: npm run package:win -- --publish "${{ steps.publish_mode.outputs.mode }}"

      - name: Upload Windows artifacts for manual dry runs
        if: steps.windows_signing.outputs.ready == 'true' && steps.publish_mode.outputs.mode != 'always'
        uses: actions/upload-artifact@v4
        with:
          name: xnat-workstation-windows
          path: release/
          if-no-files-found: error
